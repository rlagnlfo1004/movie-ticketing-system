worker_processes auto;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    upstream waiting_api {
        least_conn;
        server waiting-api-1:8080;
        server waiting-api-2:8080;
        server waiting-api-3:8080;
        keepalive 100;
    }

    upstream reservation_api {
        server reservation-api:8081;
        keepalive 32;
    }

    server {
        listen 80;

        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        location ~ ^/api/v1/screenings/[^/]+/tickets {
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_pass http://reservation_api;
        }

        location /api/v1/screenings/ {
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_pass http://waiting_api;
        }
    }
}
